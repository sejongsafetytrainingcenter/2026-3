<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안전체험교육 만족도 조사</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f1f1f1;
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      color: #222;
      margin-bottom: 10px;
    }

    #currentDate {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: #555;
      text-align: center;
    }

    #completionMessage {
      color: green;
      font-size: 1.1rem;
      margin-top: 10px;
      display: none;
    }

    #sessionButtons {
      margin-bottom: 20px;
    }

    .session-btn {
      padding: 14px 24px;
      margin: 5px;
      font-size: 1.1rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background-color: #009688;
      color: white;
    }

    #surveyForm {
      display: none;
      width: 95vw;
      max-width: 700px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    th, td {
      padding: 16px 10px;
      text-align: center;
      font-size: 1.1rem;
      border-bottom: 1px solid #eee;
    }

    th {
      background-color: #f8f8f8;
    }

    td.question {
      text-align: left;
      font-weight: bold;
      width: 60%;
    }

    .btn-container {
      display: flex;
      justify-content: space-between;
    }

    .btn {
      width: 48%;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .green { background-color: #4CAF50; color: white; }
    .yellow { background-color: #FFEB3B; }
    .red { background-color: #F44336; color: white; }
    .blue { background-color: #2196F3; color: white; }

    .btn.selected {
      outline: 3px solid #000;
      transform: scale(1.05);
    }

    .submit-btn {
      width: 100%;
      padding: 20px;
      font-size: 1.3rem;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .note {
      font-size: 0.9rem;
      color: #555;
      margin-top: 10px;
      text-align: center;
    }

  </style>
</head>
<body>

<h1>안전체험교육 만족도 조사</h1>
<div id="currentDate"></div>

<div class="note">
* 기타 의견은 포스트잇에 작성해주세요.
</div>

<div id="completionMessage">응답이 완료되었습니다.</div>

<div id="sessionButtons">
  <button class="session-btn" onclick="startSurvey('오전')">오전체험</button>
  <button class="session-btn" onclick="startSurvey('오후')">오후체험</button>
</div>

<div id="surveyForm">
<form>

<table>
<tr><th>질문</th><th>응답</th></tr>

<tr>
<td class="question">① 적극적으로 참여했다</td>
<td class="btn-container">
<button type="button" class="btn green" onclick="selectAnswer(this,'참여도','O')">O</button>
<button type="button" class="btn yellow" onclick="selectAnswer(this,'참여도','△')">△</button>
<button type="button" class="btn red" onclick="selectAnswer(this,'참여도','X')">X</button>
</td>
</tr>

<tr>
<td class="question">② 안전교육이 중요하다</td>
<td class="btn-container">
<button type="button" class="btn green" onclick="selectAnswer(this,'안전의식도','O')">O</button>
<button type="button" class="btn yellow" onclick="selectAnswer(this,'안전의식도','△')">△</button>
<button type="button" class="btn red" onclick="selectAnswer(this,'안전의식도','X')">X</button>
</td>
</tr>

<tr>
<td class="question">③ 안전하게 행동할 수 있다</td>
<td class="btn-container">
<button type="button" class="btn green" onclick="selectAnswer(this,'수업이해도','O')">O</button>
<button type="button" class="btn yellow" onclick="selectAnswer(this,'수업이해도','△')">△</button>
<button type="button" class="btn red" onclick="selectAnswer(this,'수업이해도','X')">X</button>
</td>
</tr>

<tr>
<td class="question">④ 시설이 편리했다</td>
<td class="btn-container">
<button type="button" class="btn green" onclick="selectAnswer(this,'시설만족도','O')">O</button>
<button type="button" class="btn yellow" onclick="selectAnswer(this,'시설만족도','△')">△</button>
<button type="button" class="btn red" onclick="selectAnswer(this,'시설만족도','X')">X</button>
</td>
</tr>

<tr>
<td class="question">⑤ 친구에게 추천하고 싶다</td>
<td class="btn-container">
<button type="button" class="btn green" onclick="selectAnswer(this,'추천의사','O')">O</button>
<button type="button" class="btn yellow" onclick="selectAnswer(this,'추천의사','△')">△</button>
<button type="button" class="btn red" onclick="selectAnswer(this,'추천의사','X')">X</button>
</td>
</tr>

</table>

<table>
<tr>
<td class="question">⑥ 가장 좋았던 체험</td>
<td class="btn-container" style="flex-wrap:wrap; gap:10px;">
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','산행')">산행</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','항공')">항공</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','선박')">선박</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','풍수해')">풍수해</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','완강기')">완강기</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','화재')">화재</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','응급')">응급</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','PM/자동차')">PM</button>
<button type="button" class="btn blue" onclick="selectSingle(this,'체험선호도','직업')">직업</button>
</td>
</tr>
</table>

<button class="submit-btn" type="button" onclick="submitSurvey()">제출</button>

</form>
</div>

<script>

let surveyData = {
  참여도:"",
  안전의식도:"",
  수업이해도:"",
  시설만족도:"",
  추천의사:"",
  체험선호도:""
};

function selectAnswer(btn,q,a){
  surveyData[q]=a;
  [...btn.parentElement.children].forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

function selectSingle(btn,q,a){
  surveyData[q]=a;
  [...btn.parentElement.children].forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

function startSurvey(s){
  document.getElementById("surveyForm").style.display="block";
  document.getElementById("sessionButtons").style.display="none";
}

function submitSurvey(){

  if(Object.values(surveyData).includes("")){
    alert("모든 문항 선택!");
    return;
  }

  document.getElementById("completionMessage").style.display="block";

  fetch("https://script.google.com/macros/s/AKfycby2PiqQg5jLhjnUEAh9BpplB6Xlrnuz494X4069CtI8RIc0ComvsZLqQSfUblTAZm6K/exec",{
    method:"POST",
    body:JSON.stringify(surveyData)
  });

  surveyData={
    참여도:"",
    안전의식도:"",
    수업이해도:"",
    시설만족도:"",
    추천의사:"",
    체험선호도:""
  };

  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("selected"));

  setTimeout(()=>document.getElementById("completionMessage").style.display="none",1000);
}

</script>

</body>
</html>
